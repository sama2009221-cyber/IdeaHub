<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دردشة الذكاء الاصطناعي - IdeaHub</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .chat-container {
            max-width: 800px;
            margin: 40px auto;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            height: 70vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .chat-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-soft);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .chat-messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            max-width: 80%;
            padding: 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 15px;
        }
        .msg-user {
            background: var(--accent);
            color: white;
            align-self: flex-end;
            border-bottom-left-radius: 4px;
            border-bottom-right-radius: 12px;
        }
        .msg-ai {
            background: var(--surface-2);
            color: var(--text);
            border: 1px solid var(--border-soft);
            align-self: flex-start;
            border-bottom-right-radius: 4px;
            border-bottom-left-radius: 12px;
        }
        .chat-input-area {
            padding: 24px;
            border-top: 1px solid var(--border-soft);
            display: flex;
            gap: 12px;
        }
        .chat-input-area input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border-soft);
            color: var(--text);
            padding: 16px 20px;
            border-radius: 50px;
            font-size: 16px;
            outline: none;
        }
        .chat-input-area input:focus {
            border-color: var(--accent);
        }
        .chat-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
            transition: all 0.2s;
        }
        .chat-btn:hover {
            background: var(--accent-2);
            transform: scale(1.05);
        }
        
        .chat-btn i {
            transform: scaleX(-1);
        }
    </style>
</head>
<body>
    
    <header class="header">
        <a href="dashboard.html" style="text-decoration: none; color: inherit;">
            <div class="brand flex items-center gap-2">
                <div class="logo-icon" style="background: linear-gradient(135deg, var(--accent), var(--accent-2)); width: 36px; height: 36px; border-radius: 10px;">
                    <img src="assets/logo.png" alt="IdeaHub Logo" style="width: 100%; height: 100%; object-fit: contain; border-radius: 10px;">
                </div>
                <span style="font-size: 20px; font-weight: 700; font-family: 'Sora', sans-serif;">IdeaHub</span>
                <span style="color: var(--text-faint); font-size: 14px; margin-right: 8px;">الدردشة الذكية</span>
            </div>
        </a>
        <a href="evaluations.html" class="nav-link"><i class="ph ph-arrow-right"></i> العودة للتقييمات</a>
    </header>

    <main>
        <div class="chat-container">
            <div class="chat-header">
                <i class="ph-fill ph-robot" style="font-size: 32px; color: var(--blue);"></i>
                <div>
                    <h2 style="font-size: 18px; font-weight: 700;">مساعد IdeaHub (RAG)</h2>
                    <p style="font-size: 13px; color: var(--text-dim);">اسألني أي شيء عن الأفكار المقدمة.</p>
                </div>
            </div>
            
            <div class="chat-messages" id="chat-messages">
                <div class="message msg-ai">
                    مرحباً! أنا مساعدك الذكي. لقد قرأت جميع الأفكار المقدمة لك. ماذا تود أن تعرف؟
                </div>
            </div>
            
            <form id="chat-form" class="chat-input-area">
                <input type="text" id="chat-input" placeholder="مثال: أي الأفكار لها أكبر تأثير على الإيرادات؟" autocomplete="off" required>
                <button type="submit" class="chat-btn"><i class="ph-bold ph-paper-plane-tilt"></i></button>
            </form>
        </div>
    </main>

    <script type="module" src="js/pages/chat.js"></script>
</body>
</html>
